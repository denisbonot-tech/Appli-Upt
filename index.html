<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benzjames MVP</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --text-color: #c5c6c7;
            --accent-neon: #66fcf1;
            --accent-dim: #45a29e;
            --pure-white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 60px;
        }

        /* Top Bar Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: rgba(11, 12, 16, 0.95);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(102, 252, 241, 0.1);
        }

        .brand-logo {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--pure-white);
        }

        .brand-logo span {
            color: var(--accent-neon);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .user-badge:hover {
            border-color: var(--accent-neon);
        }

        .user-avatar {
            width: 24px;
            height: 24px;
            background: var(--accent-neon);
            color: var(--bg-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
        }

        /* Mode Switcher for Demo Purposes */
        .master-toggle {
            background: none;
            border: 1px solid var(--accent-dim);
            color: var(--accent-dim);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .master-toggle.active {
            border-color: #ff4757;
            color: #ff4757;
        }

        /* Main Container layout */
        main {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* Admin/Master Panel */
        #master-panel {
            background: #151a21;
            border: 1px dashed var(--accent-dim);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: none;
        }

        #master-panel.visible {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--accent-neon);
        }

        .form-group input, .form-group textarea {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px;
            color: white;
            border-radius: 6px;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-neon);
        }

        .submit-btn {
            background: var(--accent-neon);
            color: var(--bg-color);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        /* Product Card Layout (Photo left, Data right) */
        .product-card {
            display: grid;
            grid-template-columns: 220px 1fr;
            background-color: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.02);
        }

        @media (max-width: 600px) {
            .product-card {
                grid-template-columns: 1fr;
            }
            .product-media {
                height: 250px !important;
            }
        }

        .product-media {
            position: relative;
            height: 100%;
            background: #151a21;
            min-height: 220px;
        }

        .product-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .product-details {
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-header h2 {
            color: var(--pure-white);
            font-size: 22px;
            margin-bottom: 8px;
        }

        .product-description {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
            color: #a0a5ab;
        }

        /* Metrics & Social Area */
        .product-metrics {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .stars {
            color: #ffb703;
            letter-spacing: 2px;
        }

        .like-btn {
            background: transparent;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }

        .like-btn.liked {
            color: #ff4757;
        }

        /* Reservation Button */
        .reserve-btn {
            background: transparent;
            border: 2px solid var(--accent-neon);
            color: var(--accent-neon);
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            text-align: center;
        }

        .reserve-btn:hover {
            background: var(--accent-neon);
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.4);
        }
        
        .reserve-btn.reserved {
            background: var(--accent-dim);
            border-color: var(--accent-dim);
            color: white;
            cursor: default;
            box-shadow: none;
        }

        /* Mini Tchat / Comments Section */
        .comments-section {
            margin-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
        }

        .comments-list {
            max-height: 120px;
            overflow-y: auto;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .comment-item {
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .comment-user {
            color: var(--accent-neon);
            font-weight: 600;
            margin-right: 5px;
        }

        .comment-input-box {
            display: flex;
            gap: 10px;
        }

        .comment-input-box input {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 10px;
            border-radius: 4px;
            color: white;
            font-size: 13px;
        }

        .comment-submit {
            background: var(--card-bg);
            border: 1px solid var(--accent-dim);
            color: var(--accent-neon);
            padding: 0 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        /* Identity Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }

        .modal.visible {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--accent-neon);
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-logo">BENZ<span>JAMES</span></div>
        <div class="header-actions">
            <button class="master-toggle" id="toggleMasterBtn" onclick="toggleMasterMode()">Mode : Prospect</button>
            <div class="user-badge" onclick="openIdentityModal()">
                <div class="user-avatar" id="avatarLetter">?</div>
                <span id="headerUsername">S'identifier</span>
            </div>
        </div>
    </header>

    <main>
        <!-- Panel Master : Visible uniquement si Master activé -->
        <section id="master-panel">
            <h3 style="color: white; margin-bottom: 15px; font-weight: 700;">CONFIGURATEUR MASTER (Ajouter un article)</h3>
            <div class="form-group">
                <label>Photo de l'article (Rendu IA)</label>
                <input type="file" id="newProductImage" accept="image/*">
            </div>
            <div class="form-group">
                <label>Nom du modèle exclusif</label>
                <input type="text" id="newProductName" placeholder="Ex: Cap Y7 Carbon Edition">
            </div>
            <div class="form-group">
                <label>Description du Drop & Spécifications</label>
                <textarea id="newProductDesc" rows="3" placeholder="Description des matériaux, concept, date de commercialisation visée..."></textarea>
            </div>
            <button class="submit-btn" onclick="masterAddProduct()">Lancer le Drop sur la Vitrine</button>
        </section>

        <!-- Flux vertical des articles -->
        <section id="products-feed">
            <!-- Injecté dynamiquement par JS -->
        </section>
    </main>

    <!-- Modal Identification Client / Abonnés -->
    <div class="modal" id="identityModal">
        <div class="modal-content">
            <h3 style="color: white; margin-bottom: 15px;">Espace Abonné / Identification</h3>
            <div class="form-group">
                <label>Pseudo</label>
                <input type="text" id="inputPseudo" placeholder="Ex: James91">
            </div>
            <div class="form-group">
                <label>Coordonnées (Email / Tel)</label>
                <input type="text" id="inputContact" placeholder="Ex: contact@domain.com">
            </div>
            <button class="submit-btn" onclick="saveUserIdentity()" style="margin-top: 10px;">Valider mon profil</button>
            <button class="submit-btn" onclick="closeIdentityModal()" style="background: transparent; color: #ff4757; margin-top: 10px;">Fermer</button>
        </div>
    </div>

    <script>
        // État de l'application locale
        let isMaster = false;
        let currentUser = { pseudo: 'Anonyme', contact: '' };
        let db;

        // Échantillons initiaux de données si la base est vide
        const defaultProducts = [
            {
                id: 1,
                name: "Casquette Exclusivité Y7 - Alpha Neon",
                desc: "Rendu IA Concept Pro. Visière incurvée en polymère léger, doublure respirante signature. Drop prévu pour Septembre 2026. Phase actuelle de jauge d'intérêt.",
                image: "https://images.unsplash.com/photo-1588850561407-ed78c282e89b?auto=format&fit=crop&w=400&q=80",
                likes: 42,
                stars: "★★★★★",
                comments: [
                    { user: "Alex_Fit", text: "Le rendu du tissu technique est fou !" },
                    { user: "F1_Lover", text: "Si la version réelle est fidèle au rendu, je prends direct." }
                ]
            }
        ];

        // Initialisation IndexedDB pour le stockage local permanent des produits et images IA
        const request = indexedDB.open("BenzjamesMVP_DB", 1);
        
        request.onupgradeneeded = function(e) {
            db = e.target.result;
            if (!db.objectStoreNames.contains("products")) {
                db.createObjectStore("products", { keyPath: "id", autoIncrement: true });
            }
        };

        request.onsuccess = function(e) {
            db = e.target.result;
            loadUserFromStorage();
            renderFeed();
        };

        // Gestion Mode Master / Client
        function toggleMasterMode() {
            isMaster = !isMaster;
            const btn = document.getElementById("toggleMasterBtn");
            const panel = document.getElementById("master-panel");
            
            if(isMaster) {
                btn.innerText = "Mode : Master";
                btn.classList.add("active");
                panel.classList.add("visible");
            } else {
                btn.innerText = "Mode : Prospect";
                btn.classList.remove("active");
                panel.classList.remove("visible");
            }
        }

        // Gestion de l'identité de l'Abonné
        function openIdentityModal() {
            document.getElementById("identityModal").classList.add("visible");
        }
        function closeIdentityModal() {
            document.getElementById("identityModal").classList.remove("visible");
        }

        function saveUserIdentity() {
            const pseudo = document.getElementById("inputPseudo").value.trim();
            const contact = document.getElementById("inputContact").value.trim();
            
            if(pseudo) {
                currentUser.pseudo = pseudo;
                currentUser.contact = contact;
                localStorage.setItem("bj_user", JSON.stringify(currentUser));
                updateUserUI();
                closeIdentityModal();
                renderFeed(); // Pour rafraîchir l'interface de tchat avec le bon pseudo
            }
        }

        function loadUserFromStorage() {
            const saved = localStorage.getItem("bj_user");
            if(saved) {
                currentUser = JSON.parse(saved);
                updateUserUI();
            }
        }

        function updateUserUI() {
            document.getElementById("headerUsername").innerText = currentUser.pseudo;
            document.getElementById("avatarLetter").innerText = currentUser.pseudo.charAt(0).toUpperCase();
            document.getElementById("inputPseudo").value = currentUser.pseudo;
            document.getElementById("inputContact").value = currentUser.contact;
        }

        // Lecture et rendu du flux de produits
        function renderFeed() {
            const transaction = db.transaction(["products"], "readonly");
            const store = transaction.objectStore(transaction.objectStoreNames[0]);
            const getAll = store.getAll();

            getAll.onsuccess = function() {
                let products = getAll.result;
                if(products.length === 0) {
                    // Charger les données de démo par défaut au tout premier lancement
                    const writeTx = db.transaction(["products"], "readwrite");
                    const writeStore = writeTx.objectStore("products");
                    defaultProducts.forEach(p => writeStore.add(p));
                    products = defaultProducts;
                }
                
                const feedContainer = document.getElementById("products-feed");
                feedContainer.innerHTML = "";

                // Tri décroissant pour voir les nouveautés en haut
                products.reverse().forEach(product => {
                    const card = document.createElement("div");
                    card.className = "product-card";
                    
                    // Génération HTML pour la liste des commentaires
                    let commentsHTML = "";
                    product.comments.forEach(c => {
                        commentsHTML += `
                            <div class="comment-item">
                                <span class="comment-user">${c.user}:</span>${c.text}
                            </div>`;
                    });

                    card.innerHTML = `
                        <div class="product-media">
                            <img src="${product.image}" alt="${product.name}">
                        </div>
                        <div class="product-details">
                            <div class="product-header">
                                <h2>${product.name}</h2>
                                <p class="product-description">${product.desc}</p>
                            </div>
                            
                            <div>
                                <div class="product-metrics">
                                    <span class="stars">${product.stars}</span>
                                    <button class="like-btn" onclick="likeProduct(${product.id}, this)">
                                        ❤️ <span class="like-count">${product.likes}</span>
                                    </button>
                                </div>
                                
                                <button class="reserve-btn" onclick="reserveProduct(${product.id}, this)">
                                    Réserver le produit (Option d'achat)
                                </button>
                                
                                <div class="comments-section">
                                    <div class="comments-list" id="comments-${product.id}">
                                        ${commentsHTML}
                                    </div>
                                    <div class="comment-input-box">
                                        <input type="text" id="input-${product.id}" placeholder="Posez une question ou laissez un avis...">
                                        <button class="comment-submit" onclick="addComment(${product.id})">Envoyer</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    feedContainer.appendChild(card);
                });
            };
        }

        // Action Master : Ajouter un article avec photo persistante
        function masterAddProduct() {
            const name = document.getElementById("newProductName").value.trim();
            const desc = document.getElementById("newProductDesc").value.trim();
            const imageFile = document.getElementById("newProductImage").files[0];

            if(!name || !desc) {
                alert("Veuillez remplir le nom et la description de l'article.");
                return;
            }

            const processAddition = (imageSrc) => {
                const newProduct = {
                    name: name,
                    desc: desc,
                    image: imageSrc || "https://images.unsplash.com/photo-1588850561407-ed78c282e89b?auto=format&fit=crop&w=400&q=80",
                    likes: 0,
                    stars: "★★★★★",
                    comments: []
                };

                const tx = db.transaction(["products"], "readwrite");
                const store = tx.objectStore("products");
                store.add(newProduct);

                tx.oncomplete = function() {
                    // Reset du formulaire
                    document.getElementById("newProductName").value = "";
                    document.getElementById("newProductDesc").value = "";
                    document.getElementById("newProductImage").value = "";
                    renderFeed();
                    alert("Concept mis en ligne avec succès sur votre vitrine !");
                };
            };

            if (imageFile) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    processAddition(event.target.result); // Stockage de l'image en base-64 DataURL
                };
                reader.readAsDataURL(imageFile);
            } else {
                processAddition(null);
            }
        }

        // Action Prospect : Liker un produit
        function likeProduct(id, btn) {
            const tx = db.transaction(["products"], "readwrite");
            const store = tx.objectStore("products");
            
            store.get(id).onsuccess = function(e) {
                const product = e.target.result;
                if(!btn.classList.contains("liked")) {
                    product.likes += 1;
                    btn.classList.add("liked");
                } else {
                    product.likes -= 1;
                    btn.classList.remove("liked");
                }
                store.put(product);
                btn.querySelector(".like-count").innerText = product.likes;
            };
        }

        // Action Prospect : Réserver un produit (Vérification de l'identité d'abord)
        function reserveProduct(id, btn) {
            if(currentUser.pseudo === 'Anonyme') {
                alert("Pour valider votre réservation et tester l'engouement, veuillez d'abord vous identifier via l'icône Abonné en haut à droite.");
                openIdentityModal();
                return;
            }

            btn.innerText = "✓ Demande de réservation enregistrée";
            btn.classList.add("reserved");
            btn.onclick = null;
            
            alert(`Merci ${currentUser.pseudo}. Votre intérêt pour cet article est enregistré. Vous serez recontacté sur "${currentUser.contact}" dès l'annonce de la date de commercialisation.`);
        }

        // Action Prospect : Commenter / Poser une question en direct
        function addComment(id) {
            const input = document.getElementById(`input-${id}`);
            const text = input.value.trim();
            
            if(!text) return;

            const tx = db.transaction(["products"], "readwrite");
            const store = tx.objectStore("products");

            store.get(id).onsuccess = function(e) {
                const product = e.target.result;
                const userSessionName = currentUser.pseudo === 'Anonyme' ? 'Prospect' : currentUser.pseudo;
                
                product.comments.push({
                    user: userSessionName,
                    text: text
                });
                
                store.put(product);
                
                tx.oncomplete = function() {
                    input.value = "";
                    renderFeed();
                };
            };
        }
    </script>
</body>
</html>
